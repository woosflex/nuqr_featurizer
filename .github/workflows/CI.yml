# Base workflow generated by maturin, with project-specific test/smoke gates.
name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: "Publish built artifacts to TestPyPI"
        required: false
        default: false
        type: boolean
      publish_to_pypi:
        description: "Publish built artifacts to PyPI"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  test:
    name: Rust + wheel smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ~/.cache/apt/archives
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cache/apt/archives
          sudo apt-get -o Dir::Cache::archives="$HOME/.cache/apt/archives" update
          sudo apt-get -o Dir::Cache::archives="$HOME/.cache/apt/archives" install -y pkg-config build-essential
      - name: Run Rust integration tests
        run: cargo test --tests
      - name: Build wheel for smoke test
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter python
      - name: Install wheel and verify Python API
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python - <<'PY'
          import nuqr_featurizer as n
          assert hasattr(n, "__version__")
          assert hasattr(n, "extract_features")
          assert hasattr(n, "extract_features_from_files")
          assert hasattr(n, "check_gpu")
          assert hasattr(n, "get_gpu_device_count")
          n.get_gpu_device_count()
          n.check_gpu()
          print("nuqr_featurizer wheel smoke test passed")
          PY

  linux:
    needs: test
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
          - runner: ubuntu-22.04
            target: s390x
          - runner: ubuntu-22.04
            target: ppc64le
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pip
            ~/.cache/sccache
            target
            ~/.cache/apt/archives
          key: ${{ runner.os }}-build-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.platform.target }}-
      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cache/apt/archives
          sudo apt-get -o Dir::Cache::archives="$HOME/.cache/apt/archives" update
          sudo apt-get -o Dir::Cache::archives="$HOME/.cache/apt/archives" install -y pkg-config build-essential
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  musllinux:
    needs: test
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
          - runner: ubuntu-22.04
            target: x86
          - runner: ubuntu-22.04
            target: aarch64
          - runner: ubuntu-22.04
            target: armv7
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pip
            ~/.cache/sccache
            target
            ~/.cache/apt/archives
          key: ${{ runner.os }}-build-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.platform.target }}-
      - name: Install system packages (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p ~/.cache/apt/archives
          sudo apt-get -o Dir::Cache::archives="$HOME/.cache/apt/archives" update
          sudo apt-get -o Dir::Cache::archives="$HOME/.cache/apt/archives" install -y pkg-config build-essential
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    needs: test
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
            python_arch: x64
          - runner: windows-latest
            target: x86
            python_arch: x86
          - runner: windows-11-arm
            target: aarch64
            python_arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.13
          architecture: ${{ matrix.platform.python_arch }}
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pip
            ~/.cache/sccache
            target
            C:\vcpkg
            ~/AppData/Local/vcpkg/archives
          key: ${{ runner.os }}-build-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.platform.target }}-
      - name: Install vcpkg (Windows)
        shell: powershell
        run: |
          if (!(Test-Path C:\vcpkg)) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            & C:\vcpkg\bootstrap-vcpkg.bat
          }
      - name: Set VCPKG_ROOT
        run: echo "VCPKG_ROOT=C:\\vcpkg" >> $GITHUB_ENV
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  macos:
    needs: test
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Cache build dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pip
            ~/.cache/sccache
            target
            ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-build-${{ matrix.platform.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.platform.target }}-
      - name: Install Homebrew packages (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update || true
          brew install pkg-config || true
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && (inputs.publish_to_testpypi || inputs.publish_to_pypi)) }}
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - uses: actions/download-artifact@v7
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: 'wheels-*/*'
      - name: Upload assets to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: wheels-*/*
          generate_release_notes: true
      - name: Install uv
        if: ${{ github.event_name == 'workflow_dispatch' && (inputs.publish_to_testpypi || inputs.publish_to_pypi) }}
        uses: astral-sh/setup-uv@v7
      - name: Publish to TestPyPI
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_testpypi }}
        run: uv publish --publish-url https://test.pypi.org/legacy/ 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
      - name: Publish to PyPI
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_to_pypi }}
        run: uv publish 'wheels-*/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
